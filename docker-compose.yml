services:
  cornfield:
    build: .
    image: cornfield:latest
    container_name: cornfield
    ports:
      - "${CORNFIELD_PORT:-4300}:4300"
    environment:
      - HOST=0.0.0.0
      - PORT=4300
    volumes:
      # CornField DB + thumbnails + seek previews. Keep this on the server's own
      # local filesystem (not a remote SMB/NFS mount) so SQLite locking is reliable.
      - ${CORNFIELD_DATA_PATH:-./data}:/app/data
      # Your video library, mounted read-only. Set "Library Folder Path" in
      # Settings to /library after the container starts.
      - ${CORNFIELD_LIBRARY_PATH:?Set CORNFIELD_LIBRARY_PATH in .env}:/library:ro
    restart: unless-stopped
